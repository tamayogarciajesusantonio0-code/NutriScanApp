<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIT IA — Nueva Contraseña</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="auth-screen">
    <div class="auth-card">

      <div class="auth-logo-wrap">
        <img src="img/logo-app.png" alt="FIT IA">
      </div>

      <div class="auth-title">
        <h1>Nueva Contraseña</h1>
        <p>Escribe tu nueva contraseña</p>
      </div>

      <div class="input-group">
        <label for="password">Nueva contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres">
      </div>

      <div class="input-group">
        <label for="confirmar">Confirmar contraseña</label>
        <input type="password" id="confirmar" placeholder="Repite tu contraseña">
      </div>

      <p class="error-msg" id="error-msg"></p>

      <button class="btn-primary" id="btn-guardar">Guardar Contraseña</button>

    </div>
  </main>

  <script src="js/reset-password.js"></script>
</body>
</html>
