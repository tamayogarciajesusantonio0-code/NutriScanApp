<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIT IA — Recuperar Contraseña</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="auth-screen">
    <div class="auth-card">

      <div class="auth-logo-wrap">
        <img src="img/logo-app.png" alt="FIT IA">
      </div>

      <div class="auth-title">
        <h1>Recuperar Contraseña</h1>
        <p>Te enviaremos un link a tu correo</p>
      </div>

      <div class="input-group">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" placeholder="ejemplo@correo.com">
      </div>

      <p class="error-msg" id="error-msg"></p>
      <p class="success-msg" id="success-msg"></p>

      <button class="btn-primary" id="btn-enviar">Enviar Link</button>

      <div class="auth-link">
        <a href="login.html">← Volver al Login</a>
      </div>

    </div>
  </main>

  <script src="js/olvido-password.js"></script>
</body>
</html>
