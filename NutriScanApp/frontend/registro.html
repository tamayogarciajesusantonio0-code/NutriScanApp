<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIT IA — Crear Cuenta</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ══════════════════════════════════════
       PANTALLA: REGISTRO
  ══════════════════════════════════════════ -->
  <main class="auth-screen">
    <div class="auth-card">

      <!-- Logo de la app -->
      <div class="auth-logo-wrap">
        <img src="img/logo-app.png" alt="FIT IA">
      </div>

      <!-- Título -->
      <div class="auth-title">
        <h1>Crear Cuenta</h1>
        <p>Regístrate para comenzar</p>
      </div>

      <!-- Formulario -->
      <div class="input-group">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" placeholder="Tu nombre">
      </div>

      <div class="input-group">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" placeholder="ejemplo@correo.com">
      </div>

      <div class="input-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres">
      </div>

      <div class="input-group">
        <label for="confirmar">Confirmar contraseña</label>
        <input type="password" id="confirmar" placeholder="Repite tu contraseña">
      </div>

      <p class="error-msg" id="error-msg"></p>

      <button class="btn-primary" id="btn-registro">Crear Cuenta</button>

      <div class="auth-link">
        ¿Ya tienes cuenta? <a href="login.html">Iniciar Sesión</a>
      </div>

    </div>
  </main>

  <script src="js/registro.js"></script>
</body>
</html>
